<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Claw Live Sites Directory</title><style>
body{font-family:Inter,system-ui;background:#f9f7f4;margin:0;color:#21243b}.wrap{max-width:1080px;margin:0 auto;padding:24px}h1{margin:0 0 8px}.sub{color:#616b86;margin:0 0 18px}.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}.filters button{border:1px solid #e8e3da;background:#fff;padding:8px 12px;border-radius:999px;cursor:pointer}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}.card{background:#fff;border:1px solid #ece8df;border-radius:14px;padding:14px;box-shadow:0 8px 20px #00000010}.repo{font-weight:700;margin-bottom:6px}.meta{font-size:12px;color:#6a718b;margin-bottom:8px}.tag{display:inline-block;font-size:12px;background:#f1f4ff;color:#4051d0;padding:4px 8px;border-radius:999px}a{color:#3f63ff;text-decoration:none}
</style></head><body><div class="wrap"><h1>Claw Live Sites</h1><p class="sub">From GitHub claw-related repos with deployable URLs in description/homepage/README.</p><div class="filters"><button data-f="all">All</button><button data-f="site">Site</button><button data-f="docs">Docs</button><button data-f="app">App</button><button data-f="blog">Blog</button></div><div id="grid" class="grid"></div></div><script>
let DATA=[],current='all';function render(){const g=document.getElementById('grid');g.innerHTML='';DATA.filter(x=>current==='all'||x.tag===current).forEach(x=>{const el=document.createElement('article');el.className='card';el.innerHTML=`<div class='repo'>${x.repo}</div><div class='meta'>⭐ ${x.stars} · <span class='tag'>${x.tag}</span></div><p><a href='${x.url}' target='_blank'>${x.url}</a></p>`;g.appendChild(el);});}
fetch('./claw-live-sites.json').then(r=>r.json()).then(d=>{DATA=d;render();});document.querySelectorAll('.filters button').forEach(b=>b.onclick=()=>{current=b.dataset.f;render();});
</script></body></html>
