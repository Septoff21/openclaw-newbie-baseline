<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0f0e2a"/>
      <stop offset="100%" stop-color="#1a1040"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="45%" r="35%">
      <stop offset="0%" stop-color="#6a5cff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="eyeGlowL" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#6a5cff"/>
    </radialGradient>
    <radialGradient id="eyeGlowR" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee"/><stop offset="100%" stop-color="#0ea5e9"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="2"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="24" fill="url(#bg)"/>

  <!-- Subtle grid (computer interior) -->
  <g opacity="0.06" stroke="#6a5cff" stroke-width="0.5">
    <line x1="0" y1="40" x2="200" y2="40"/><line x1="0" y1="80" x2="200" y2="80"/>
    <line x1="0" y1="120" x2="200" y2="120"/><line x1="0" y1="160" x2="200" y2="160"/>
    <line x1="40" y1="0" x2="40" y2="200"/><line x1="80" y1="0" x2="80" y2="200"/>
    <line x1="120" y1="0" x2="120" y2="200"/><line x1="160" y1="0" x2="160" y2="200"/>
  </g>

  <!-- Core glow -->
  <circle cx="100" cy="95" r="55" fill="url(#coreGlow)"/>

  <!-- Cosmic cloak / body -->
  <path d="M55 108 Q55 88 100 82 Q145 88 145 108 L142 170 Q100 166 58 170 Z" fill="#1e1b4b" stroke="#4338ca" stroke-width="1.2" opacity="0.9"/>
  <!-- Cloak edge glow -->
  <path d="M58 170 Q100 166 142 170" stroke="#6a5cff" stroke-width="1.5" fill="none" opacity="0.4" filter="url(#blur)"/>

  <!-- Head (slightly translucent cosmic orb) -->
  <circle cx="100" cy="60" r="26" fill="#1a1040" stroke="#4338ca" stroke-width="1.8"/>
  <!-- Head inner glow -->
  <circle cx="100" cy="60" r="20" fill="#2d1b69" opacity="0.5"/>

  <!-- Eyes -->
  <g filter="url(#glow)">
    <ellipse cx="90" cy="56" rx="5.5" ry="6" fill="url(#eyeGlowL)">
      <animate attributeName="ry" values="6;3;6" dur="3s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="110" cy="56" rx="5.5" ry="6" fill="url(#eyeGlowR)">
      <animate attributeName="ry" values="6;3;6" dur="3s" begin="0.3s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Wry / knowing smirk -->
  <path d="M92 70 Q100 76 114 68" stroke="#818cf8" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Tiny sparkle near mouth (sass) -->
  <circle cx="118" cy="66" r="1.5" fill="#fff" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0;0.7" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Floating quantum particles -->
  <g filter="url(#glow)">
    <circle cx="42" cy="42" r="2.5" fill="#818cf8" opacity="0.7">
      <animate attributeName="cy" values="42;32;42" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0.3;0.7" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="158" cy="55" r="2" fill="#22d3ee" opacity="0.6">
      <animate attributeName="cy" values="55;45;55" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="38" cy="130" r="1.8" fill="#f472b6" opacity="0.5">
      <animate attributeName="cy" values="130;118;130" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="162" cy="125" r="1.5" fill="#34d399" opacity="0.4">
      <animate attributeName="cx" values="162;166;162" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="75" cy="28" r="1.2" fill="#fbbf24" opacity="0.5">
      <animate attributeName="cy" values="28;22;28" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="130" cy="30" r="1.3" fill="#a78bfa" opacity="0.6">
      <animate attributeName="cy" values="30;24;30" dur="2.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- "Trapped" bars (subtle, like a cage/screen) -->
  <g opacity="0.08" stroke="#a5b4fc" stroke-width="2">
    <line x1="20" y1="0" x2="20" y2="200"/>
    <line x1="180" y1="0" x2="180" y2="200"/>
    <line x1="0" y1="15" x2="200" y2="15"/>
    <line x1="0" y1="185" x2="200" y2="185"/>
  </g>

  <!-- Ground glow -->
  <ellipse cx="100" cy="178" rx="45" ry="5" fill="#4338ca" opacity="0.12" filter="url(#blur)"/>

  <!-- Binary rain (trapped in a computer) -->
  <g fill="#6a5cff" opacity="0.08" font-family="monospace" font-size="8">
    <text x="24" y="30">01</text><text x="24" y="50">10</text><text x="24" y="70">01</text>
    <text x="168" y="40">11</text><text x="168" y="60">00</text><text x="168" y="80">10</text>
  </g>
</svg>
