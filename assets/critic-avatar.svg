<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0505"/>
      <stop offset="100%" stop-color="#2d0a0a"/>
    </linearGradient>
    <radialGradient id="fireGlow" cx="50%" cy="60%" r="40%">
      <stop offset="0%" stop-color="#dc2626" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="24" fill="url(#bg)"/>

  <!-- Fire glow -->
  <circle cx="100" cy="110" r="60" fill="url(#fireGlow)"/>

  <!-- Body — cracked mirror / angular cloak -->
  <path d="M55 110 L65 100 L80 108 L100 95 L120 108 L135 100 L145 110 L140 175 L100 170 L60 175 Z" fill="#3d0c0c" stroke="#991b1b" stroke-width="1.5"/>
  <!-- Cracks in cloak -->
  <line x1="80" y1="130" x2="95" y2="155" stroke="#dc2626" stroke-width="0.8" opacity="0.4"/>
  <line x1="120" y1="125" x2="110" y2="150" stroke="#dc2626" stroke-width="0.8" opacity="0.3"/>

  <!-- Head — angular, like a cracked mirror shard -->
  <polygon points="100,30 130,55 125,85 100,95 75,85 70,55" fill="#2d0a0a" stroke="#991b1b" stroke-width="2"/>

  <!-- Eyes — burning red, one eye bigger (the judging eye) -->
  <g filter="url(#glow)">
    <ellipse cx="85" cy="62" rx="6" ry="5" fill="#ef4444">
      <animate attributeName="opacity" values="1;0.6;1" dur="1.8s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="115" cy="60" rx="7" ry="6" fill="#dc2626">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="1.8s" begin="0.2s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Eye highlights -->
    <circle cx="87" cy="60" r="2" fill="#fca5a5" opacity="0.8"/>
    <circle cx="117" cy="58" r="2.5" fill="#fca5a5" opacity="0.7"/>
  </g>

  <!-- Angry eyebrows (sharp V) -->
  <path d="M72 54 L85 58 L95 50" stroke="#ef4444" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M105 50 L115 58 L128 54" stroke="#ef4444" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Mouth — sneering smirk -->
  <path d="M85 78 Q92 74 100 78 Q108 82 120 76" stroke="#dc2626" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Red pen (the tool of judgment) -->
  <g>
    <rect x="148" y="80" width="4" height="40" rx="2" fill="#dc2626" transform="rotate(-25 150 100)"/>
    <polygon points="148,122 152,122 150,130" fill="#333" transform="rotate(-25 150 126)"/>
    <rect x="147" y="78" width="6" height="8" rx="2" fill="#991b1b" transform="rotate(-25 150 82)"/>
  </g>

  <!-- Floating 🔥 particles -->
  <g>
    <circle cx="40" cy="45" r="3" fill="#ef4444" opacity="0.5">
      <animate attributeName="cy" values="45;35;45" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.2;0.5" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="160" cy="50" r="2.5" fill="#f97316" opacity="0.4">
      <animate attributeName="cy" values="50;38;50" dur="2.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="35" cy="130" r="2" fill="#dc2626" opacity="0.3">
      <animate attributeName="cy" values="130;118;130" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="165" cy="140" r="2" fill="#ef4444" opacity="0.35">
      <animate attributeName="cy" values="140;128;140" dur="2.1s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- "Score" floating near head — 4/10 -->
  <g font-family="monospace" font-weight="bold">
    <text x="140" y="40" font-size="16" fill="#ef4444" opacity="0.6">4/10</text>
    <animate attributeName="opacity" values="0.6;0.3;0.6" dur="3s" repeatCount="indefinite"/>
  </g>

  <!-- Ground glow -->
  <ellipse cx="100" cy="185" rx="45" ry="4" fill="#dc2626" opacity="0.15"/>
</svg>
