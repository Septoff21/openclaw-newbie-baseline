<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f0e8"/>
      <stop offset="100%" stop-color="#e8e0d4"/>
    </linearGradient>
    <linearGradient id="shirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2874a6"/>
      <stop offset="100%" stop-color="#1e5f87"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="24" fill="url(#bg)"/>

  <!-- Warm radial -->
  <circle cx="100" cy="100" r="80" fill="#f5e6d3" opacity="0.3"/>

  <!-- Body / shirt -->
  <path d="M65 115 Q65 108 100 105 Q135 108 135 115 L138 180 Q100 178 62 180 Z" fill="url(#shirt)"/>
  <!-- Collar -->
  <path d="M82 108 L100 120 L118 108" stroke="#1e5f87" stroke-width="2" fill="none"/>

  <!-- Neck -->
  <rect x="88" y="90" width="24" height="18" rx="8" fill="#ffe0bd"/>

  <!-- Head -->
  <circle cx="100" cy="65" r="32" fill="#ffe0bd"/>
  <!-- Cheeks (warm) -->
  <circle cx="80" cy="72" r="8" fill="#ffbfa0" opacity="0.25"/>
  <circle cx="120" cy="72" r="8" fill="#ffbfa0" opacity="0.25"/>

  <!-- Eyes (confident, looking slightly up-right) -->
  <g>
    <ellipse cx="89" cy="60" rx="4" ry="4.5" fill="#333"/>
    <ellipse cx="111" cy="60" rx="4" ry="4.5" fill="#333"/>
    <!-- Eye highlight -->
    <circle cx="91" cy="58" r="1.5" fill="#fff" opacity="0.8"/>
    <circle cx="113" cy="58" r="1.5" fill="#fff" opacity="0.8"/>
  </g>

  <!-- Determined eyebrows -->
  <path d="M80 52 Q89 48 96 53" stroke="#5a3e2b" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M104 53 Q111 48 120 52" stroke="#5a3e2b" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Smile (warm, slight asymmetry = human) -->
  <path d="M89 76 Q100 84 113 76" stroke="#c0724a" stroke-width="2.2" fill="none" stroke-linecap="round"/>

  <!-- Hard hat / construction helmet -->
  <path d="M66 54 Q66 30 100 28 Q134 30 134 54" fill="#f59e0b" stroke="#d97706" stroke-width="2"/>
  <rect x="60" y="52" width="80" height="9" rx="4.5" fill="#f59e0b" stroke="#d97706" stroke-width="2"/>
  <!-- Hat shine -->
  <path d="M78 40 Q90 35 100 40" stroke="#fcd34d" stroke-width="2" fill="none" opacity="0.6"/>

  <!-- Wrench (held in right hand area) -->
  <g>
    <rect x="140" y="105" width="5" height="38" rx="2.5" fill="#6b7280" transform="rotate(15 142 124)"/>
    <circle cx="142" cy="100" r="9" fill="none" stroke="#6b7280" stroke-width="4"/>
    <circle cx="142" cy="100" r="3" fill="#9ca3af"/>
  </g>

  <!-- Clipboard (left hand area, the "builder" always has a plan) -->
  <g>
    <rect x="30" y="100" width="28" height="36" rx="4" fill="#fbbf24" stroke="#d97706" stroke-width="1.5"/>
    <rect x="38" y="96" width="12" height="8" rx="4" fill="#d97706"/>
    <line x1="36" y1="112" x2="52" y2="112" stroke="#92400e" stroke-width="1" opacity="0.4"/>
    <line x1="36" y1="118" x2="52" y2="118" stroke="#92400e" stroke-width="1" opacity="0.4"/>
    <line x1="36" y1="124" x2="48" y2="124" stroke="#92400e" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Ground shadow -->
  <ellipse cx="100" cy="188" rx="55" ry="4" fill="#ccc" opacity="0.4"/>

  <!-- Small sparkle near hat (always building something) -->
  <g fill="#f59e0b" opacity="0.6">
    <polygon points="155,35 157,30 159,35 164,37 159,39 157,44 155,39 150,37">
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2s" repeatCount="indefinite"/>
    </polygon>
  </g>
</svg>
